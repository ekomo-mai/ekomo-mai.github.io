<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大人だって褒められたい | ekomo-mai</title>
<style>
  :root{
    --pink:#fdeef4; --lavender:#f3e8ff; --cream:#fff6e8; --peach:#ffe9dc;
    --ink:#6b5d6e; --ink-soft:#9b8aa0; --accent:#c9a0dc; --gold:#e8b86d;
    --card:#fffdfa;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--lavender) 0%,var(--pink) 35%,var(--cream) 70%,var(--peach) 100%);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.8;
  }
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 60px;}
  header{text-align:center;margin-bottom:26px;}
  .brand{font-size:10px;letter-spacing:4px;color:var(--ink-soft);margin-bottom:6px;}
  h1{font-size:24px;font-weight:600;letter-spacing:6px;color:#7a5c84;}
  .tagline{font-size:12px;color:var(--ink-soft);margin-top:6px;letter-spacing:2px;}

  .card{
    background:var(--card);
    border-radius:22px;
    padding:24px 22px;
    margin-bottom:22px;
    box-shadow:0 8px 24px rgba(180,150,200,.18);
    border:1px solid rgba(255,255,255,.8);
  }
  .card-label{
    display:inline-block;font-size:11px;letter-spacing:2px;color:#fff;
    background:linear-gradient(90deg,#d8b4e8,#f0b9c8);
    padding:3px 14px;border-radius:999px;margin-bottom:14px;
  }
  .date-line{font-size:12px;color:var(--ink-soft);margin-bottom:12px;}

  /* 今日の妖精 */
  .fairy-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .fairy-gem{
    width:58px;height:58px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;flex-shrink:0;
    box-shadow:inset 0 -4px 8px rgba(0,0,0,.06), 0 4px 10px rgba(180,150,200,.25);
  }
  .fairy-name{font-size:17px;font-weight:600;color:#7a5c84;}
  .fairy-title{font-size:11px;color:var(--ink-soft);}
  .message{
    background:linear-gradient(135deg,#fdf4ff,#fff8f0);
    border-radius:16px;padding:18px 16px;font-size:15px;
    margin-bottom:14px;min-height:80px;
  }
  .lucky{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .lucky span{
    font-size:12px;background:#fff3e0;color:#b08850;
    padding:5px 12px;border-radius:999px;
  }
  .btn{
    display:inline-block;border:none;cursor:pointer;
    font-family:inherit;font-size:13px;letter-spacing:1px;
    padding:10px 22px;border-radius:999px;color:#fff;
    background:linear-gradient(90deg,#cba6e3,#f0a8bf);
    box-shadow:0 4px 12px rgba(200,150,200,.3);
    transition:transform .15s, box-shadow .15s;
  }
  .btn:active{transform:scale(.96);}
  .btn.gold{background:linear-gradient(90deg,#eec27f,#f4a98c);box-shadow:0 4px 12px rgba(230,180,120,.3);}
  .btn.ghost{background:#fff;color:#b08bc4;border:1.5px solid #e3cdf0;box-shadow:none;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  /* がんばり褒め */
  .input-row{display:flex;gap:8px;margin-bottom:12px;}
  input[type=text]{
    flex:1;border:1.5px solid #ecdcf5;border-radius:999px;
    padding:10px 16px;font-family:inherit;font-size:14px;color:var(--ink);
    background:#fffdfa;outline:none;
  }
  input[type=text]:focus{border-color:#d8b4e8;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .chip{
    font-size:12px;background:#f7eefb;color:#9b7bb0;border:none;cursor:pointer;
    padding:6px 13px;border-radius:999px;font-family:inherit;
    transition:background .15s;
  }
  .chip:hover{background:#efdcf8;}
  .praise-result{
    display:none;background:linear-gradient(135deg,#fff4f8,#fff8ec);
    border-radius:16px;padding:16px;font-size:14px;margin-top:4px;
    animation:pop .35s ease;
  }
  @keyframes pop{0%{transform:scale(.92);opacity:0;}100%{transform:scale(1);opacity:1;}}

  /* ここコロ チャット */
  .chat-box{
    background:#fdf8ff;border-radius:16px;padding:14px;
    height:300px;overflow-y:auto;margin-bottom:12px;
    display:flex;flex-direction:column;gap:10px;
  }
  .bubble{
    max-width:82%;padding:10px 14px;border-radius:16px;font-size:13.5px;
    animation:pop .3s ease;white-space:pre-wrap;
  }
  .bubble.koko{
    align-self:flex-start;background:#fff;border:1px solid #f0e2f8;
    border-bottom-left-radius:4px;
  }
  .bubble.me{
    align-self:flex-end;background:linear-gradient(135deg,#f8dce8,#f3e3fa);
    border-bottom-right-radius:4px;color:#7a5c84;
  }
  .koko-name{font-size:10px;color:#c9a0dc;margin-bottom:2px;}
  .mood-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .mood{
    font-size:12px;background:#fff;border:1.5px solid #f0e2f8;cursor:pointer;
    padding:6px 11px;border-radius:999px;font-family:inherit;color:#9b7bb0;
    transition:background .15s;
  }
  .mood:hover{background:#faf0ff;}

  /* 宝箱 */
  .treasure-list{display:flex;flex-direction:column;gap:10px;}
  .treasure-item{
    background:linear-gradient(135deg,#fffaf0,#fdf4ff);
    border-radius:14px;padding:12px 14px;font-size:13px;
    border:1px solid #f5e8d8;position:relative;
  }
  .treasure-meta{font-size:10.5px;color:var(--ink-soft);margin-top:4px;}
  .treasure-del{
    position:absolute;top:8px;right:10px;border:none;background:none;
    cursor:pointer;font-size:12px;color:#d8c0e0;
  }
  .empty-note{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:10px 0;}
  .count-badge{font-size:11px;color:#b08850;margin-left:8px;}

  footer{text-align:center;font-size:10.5px;color:var(--ink-soft);letter-spacing:2px;margin-top:10px;}
  footer .heart{color:#f0a8bf;}

  /* キラキラ */
  .sparkle{position:fixed;pointer-events:none;font-size:14px;animation:fall 1.6s ease-out forwards;z-index:99;}
  @keyframes fall{
    0%{opacity:1;transform:translateY(0) rotate(0deg);}
    100%{opacity:0;transform:translateY(90px) rotate(180deg);}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">EKOMO MAI ・ AI STUDIO</div>
    <h1>大人だって褒められたい</h1>
    <div class="tagline">あなたの中にも光があるよ</div>
  </header>

  <!-- ① 今日の妖精さんからのメッセージ -->
  <section class="card">
    <span class="card-label">✦ 今日のメッセージ</span>
    <div class="date-line" id="dateLine"></div>
    <div class="fairy-head">
      <div class="fairy-gem" id="fairyGem">💎</div>
      <div>
        <div class="fairy-name" id="fairyName"></div>
        <div class="fairy-title" id="fairyTitle"></div>
      </div>
    </div>
    <div class="message" id="fairyMessage"></div>
    <div class="lucky">
      <span id="luckyItem"></span>
      <span id="luckyColor"></span>
    </div>
    <div class="btn-row">
      <button class="btn" id="newMsgBtn">🔮 新しいメッセージ</button>
      <button class="btn ghost" id="saveMsgBtn">💛 宝箱にとっておく</button>
    </div>
  </section>

  <!-- ② 今日のがんばり褒め -->
  <section class="card">
    <span class="card-label">🌸 今日のがんばり、おしえて</span>
    <p style="font-size:13px;margin-bottom:12px;">どんなに小さなことでも、ここコロが全力で褒めるよ。</p>
    <div class="chips">
      <button class="chip" data-text="朝、ちゃんと起きた">朝起きた</button>
      <button class="chip" data-text="ごはんを作った">ごはん作った</button>
      <button class="chip" data-text="お仕事をがんばった">お仕事した</button>
      <button class="chip" data-text="ちゃんと休んだ">休んだ</button>
      <button class="chip" data-text="今日を生きた">今日を生きた</button>
    </div>
    <div class="input-row">
      <input type="text" id="effortInput" placeholder="例：洗濯物をたたんだ" maxlength="60">
      <button class="btn gold" id="praiseBtn">褒めて！</button>
    </div>
    <div class="praise-result" id="praiseResult"></div>
    <div class="btn-row" id="praiseSaveRow" style="display:none;margin-top:12px;">
      <button class="btn ghost" id="savePraiseBtn">💛 この褒め言葉をとっておく</button>
    </div>
  </section>

  <!-- ③ ここコロとおしゃべり -->
  <section class="card">
    <span class="card-label">💬 ここコロと、心に寄り添う会話</span>
    <div class="chat-box" id="chatBox"></div>
    <div class="mood-row">
      <button class="mood" data-mood="うれしい">😊 うれしい</button>
      <button class="mood" data-mood="つかれた">😪 つかれた</button>
      <button class="mood" data-mood="かなしい">😢 かなしい</button>
      <button class="mood" data-mood="もやもや">😠 もやもや</button>
      <button class="mood" data-mood="ふあん">🥺 ふあん</button>
    </div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="今の気持ち、そのままでいいよ" maxlength="120">
      <button class="btn" id="chatBtn">送る</button>
    </div>
  </section>

  <!-- ④ 褒めの宝箱 -->
  <section class="card">
    <span class="card-label">🎁 褒めの宝箱</span><span class="count-badge" id="treasureCount"></span>
    <p style="font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;">とっておいた言葉は、いつでもここで読み返せるよ。</p>
    <div class="treasure-list" id="treasureList"></div>
  </section>

  <footer>
    人生の主役は、あなたです <span class="heart">♡</span><br>
    ekomo-mai ・ こころのつばさ
  </footer>
</div>

<script>
/* ============================================================
   天然石の妖精たち（22名）— 毎日ひとり、あなたを褒めに来る
   ============================================================ */
const FAIRIES = [
  {name:"クリスタルちゃん", title:"原初の光・はじまりの石", emoji:"🔮", color:"#f2f0ff",
   messages:[
    "こっちだよ。…ふふ、ちゃんと来てくれたね。それだけで、今日のあなたは100点だよ。",
    "あなたの中の光、ちゃんと見えてるよ。曇って見える日も、消えたわけじゃないからね。",
    "迷った時は、鏡をのぞいてみて。そこに映っている人が、この物語の主役だよ。"]},
  {name:"ローズクォーツちゃん", title:"愛の代表・ヴィーナスの石", emoji:"🌸", color:"#ffe8f0",
   messages:[
    "今日のあなたへのおむすび🍙 はい、どうぞ。「お結び」はね、縁を結ぶの。あなたと今日の小さな幸せも、ちゃんと結んでおいたよ。",
    "自分に優しくできない日もあるよね。そういう日は、わたしがあなたに優しくする番だよ。",
    "あなたが誰かを思いやったぶん、ちゃんと愛は巡ってるよ。先に言っておくね、「えらい」って。"]},
  {name:"ムーンストーンちゃん", title:"月の守り手", emoji:"🌙", color:"#eef2ff",
   messages:[
    "がんばった日も、がんばれなかった日も、月は同じようにあなたを照らすよ。今夜はゆっくりおやすみ。",
    "満ちて、欠けて、また満ちる。あなたの心もそれでいいの。欠けてる時期も、月のうちだよ。",
    "黒ウサギと白ウサギが言ってたよ。「あの人、今日もちゃんとやってた」って。月の使いは見てるからね。"]},
  {name:"サンちゃん", title:"太陽の守り手", emoji:"☀️", color:"#fff3d6",
   messages:[
    "あなたは輝いてるよ！自分じゃ気づいてないだけ！太陽のわたしが言うんだから間違いないよ！",
    "沈んでも、また昇ればいい。今日うまくいかなくても、明日の朝はちゃんと来るからね。さあ行こう！",
    "あなたの中には、もう太陽がある。だから今日もパンケーキ食べて元気出していこ🥞"]},
  {name:"ラピスちゃん", title:"星空の守り手", emoji:"🌌", color:"#e4e8f8",
   messages:[
    "星空はいつもあなたを見てるよ。誰も見てないところでがんばったこと、星はぜんぶ知ってるからね。",
    "夜が深いほど、星はきれいに見えるの。つらい時期のあなたほど、本当はきらきらしてるんだよ。",
    "ゆきひょうがね、「あの人は強い」って言ってたよ。見た目は怖いけど優しいあの子が言うなら、本物だよ。"]},
  {name:"エメラルドちゃん", title:"森の統治者・知性と愛", emoji:"💚", color:"#e4f6ec",
   messages:[
    "あなたの判断、間違ってなかったよ。森の女王として保証する。自分を疑いすぎないでね。",
    "ハチドリと一緒に、あなたのための薬を作ったの。レシピは「ちゃんと寝ること」。今日は早めにおやすみ。",
    "賢いあなたは、つい考えすぎちゃうね。今日はもう、考えるのおしまい。それも知性のうちよ。"]},
  {name:"アクアマリンちゃん", title:"自由で優しい海の姫", emoji:"💙", color:"#e0f4f8",
   messages:[
    "海はね、どんな川の水も受け入れるの。今日のあなたの涙も愚痴も、ぜんぶ流していいんだよ。",
    "アネモネの花言葉、知ってる？「あなたを信じて待つ」。焦らなくていい、わたしは待ってるからね。",
    "深呼吸して。まず、呼吸していいよ。波の音に合わせて、ゆっくり、ゆっくりね。"]},
  {name:"モルガナイトちゃん", title:"愛を育てる守護姫", emoji:"💗", color:"#fde8ec",
   messages:[
    "愛はね、育てるものなの。あなたが毎日積み重ねてる小さなこと、ぜんぶ愛の水やりだよ。",
    "誰かのためにがんばれるあなたは素敵。でもね、あなた自身にも同じ優しさをあげてね。",
    "献身って、目立たないの。だから、わたしがちゃんと見て、ちゃんと褒める係なの。…えらいよ。"]},
  {name:"パールちゃん", title:"海の祈りの石", emoji:"🤍", color:"#f7f5f0",
   messages:[
    "真珠はね、痛みを包んで、まあるく光るの。あなたの傷も、いつかあなただけの輝きになるよ。",

   messages:[
    "珊瑚はね、小さな命の集合体なの。あなたの小さながんばりも、集まって大きな礁になるんだよ。",
    "海の中では、ゆらゆらしてていいの。まっすぐ立ってなくても、ちゃんと生きてるってことだから。",
    "あなたの周りに、ちゃんと命が集まってる。それはあなたが居場所になれてる証拠だよ。"]},
  {name:"ラリマーちゃん", title:"癒しのカリブの石", emoji:"🩵", color:"#e2f3f6",

  {name:"ダイヤちゃん", title:"最強硬度の輝き", emoji:"💎", color:"#f0f4f8",

  {name:"ペリドットちゃん", title:"太陽の石・夜のエメラルド", emoji:"🌿", color:"#eef6e0",

  {name:"トパーズちゃん", title:"誠実の四姉妹（黄白青桃）", emoji:"🍯", color:"#fdf2dc",
   messages:[

  {name:"タイガ", title:"大地の虎・行動力の石", emoji:"🐯", color:"#fbecd8",

/* ---- 日替わりロジック（日付シードで毎日同じ子・同じ運勢） ---- */
const today = new Date();
const seed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
function seededPick(arr, salt){ return arr[(seed + salt*7919) % arr.length]; }

let currentFairy = FAIRIES[seed % FAIRIES.length];
let currentMsg = currentFairy.messages[seed % currentFairy.messages.length];

  `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${youbi}）の妖精さん`;

function renderFairy(){
  document.getElementById("fairyGem").textContent = currentFairy.emoji;
  document.getElementById("fairyGem").style.background = currentFairy.color;
  document.getElementById("fairyName").textContent = currentFairy.name;
  document.getElementById("fairyTitle").textContent = currentFairy.title;
  document.getElementById("fairyMessage").textContent = currentMsg;
  document.getElementById("luckyItem").textContent = "🍀 ラッキーアイテム：" + seededPick(LUCKY_ITEMS, 1);
  document.getElementById("luckyColor").textContent = "🎨 ラッキーカラー：" + seededPick(LUCKY_COLORS, 2);
}

});

function addBubble(text, who){
  const b = document.createElement("div");
  b.className = "bubble " + who;
  if(who === "koko"){
    const n = document.createElement("div");
    n.className = "koko-name"; n.textContent = "ここコロ";
    b.appendChild(n);
    const t = document.createElement("div"); t.textContent = text;
    b.appendChild(t);
  } else { b.textContent = text; }
  chatBox.appendChild(b);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function kokoReply(text){
  let pool = null;
  for(const rule of KOKO_RULES){
    if(rule.keys.some(k => text.includes(k))){ pool = rule.replies; break; }
  }
  if(!pool) pool = KOKO_FALLBACK;
  const reply = pool[Math.floor(Math.random()*pool.length)];
  setTimeout(() => addBubble(reply, "koko"), 600 + Math.random()*500);
}
function sendChat(text){
  if(!text.trim()) return;
  addBubble(text.trim(), "me");
  chatInput.value = "";
  kokoReply(text.trim());
}

/* ============================================================
   褒めの宝箱（localStorage）
   ============================================================ */
const STORE_KEY = "ekomomai_homebox";
function loadTreasure(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }catch(e){ return []; } }
function saveTreasure(list){ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
function renderTreasure(){
  const list = loadTreasure();
  const box = document.getElementById("treasureList");
  box.innerHTML = "";
  document.getElementById("treasureCount").textContent = list.length ? `✦ ${list.length}個の宝物` : "";
  if(!list.length){
    box.innerHTML = '<div class="empty-note">まだ空っぽ。💛ボタンで、好きな言葉をしまってね。</div>';
    return;
  }
  list.slice().reverse().forEach((item, ri) => {
    const idx = list.length - 1 - ri;
    const div = document.createElement("div");
    div.className = "treasure-item";
    const txt = document.createElement("div"); txt.textContent = item.text;
    const meta = document.createElement("div"); meta.className = "treasure-meta";
    meta.textContent = `${item.from} ・ ${item.date}`;
    const del = document.createElement("button");
    del.className = "treasure-del"; del.textContent = "✕"; del.title = "手放す";
    del.addEventListener("click", () => {
      const l = loadTreasure(); l.splice(idx,1); saveTreasure(l); renderTreasure();
    });
    div.appendChild(del); div.appendChild(txt); div.appendChild(meta);
    box.appendChild(div);
  });
}
function addTreasure(text, from){
  const list = loadTreasure();
  const d = new Date();
  list.push({text, from, date:`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`});
  saveTreasure(list);
  renderTreasure();
  sparkle();
}
document.getElementById("saveMsgBtn").addEventListener("click", () =>

  if(lastPraise) addTreasure(lastPraise, "ここコロ");
});

/* ============================================================
   キラキラ演出
   ============================================================ */
function sparkle(){
  const chars = ["✨","💛","🌸","⭐","💎"];
  for(let i=0;i<8;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = chars[Math.floor(Math.random()*chars.length)];
    s.style.left = (10 + Math.random()*80) + "vw";
    s.style.top = (20 + Math.random()*40) + "vh";
    s.style.animationDelay = (Math.random()*0.4) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2200);
  }
}
